name: smartqueue_admin
description: SmartQueue Admin App - Manage queues, branches and counters.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^17.1.0

  # UI
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  shimmer: ^3.0.0

  # Utils
  google_maps_flutter: ^2.10.0
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  equatable: ^2.0.5
  timeago: ^3.6.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
